<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Login | ISPHILO FRAGRANCE</title>
    
    <!-- CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    
    <!-- Components -->
    <script src="assets/js/components.js" defer></script>
    <style>
        .auth-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--off-white);
            padding: 40px 20px;
        }
        .auth-card {
            background: var(--pure-white);
            width: 100%;
            max-width: 450px;
            padding: 60px 40px;
            border: 1px solid var(--gray-light);
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.05);
        }
        .logo-text {
            font-family: 'Montserrat', sans-serif;
            font-size: 18px;
            font-weight: 800;
            letter-spacing: 1px;
            color: var(--primary-red);
            text-transform: uppercase;
            margin-top: 15px;
        }
        .logo-text span {
            color: var(--pure-black);
        }
        .auth-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 32px;
            font-weight: 700;
            margin-top: 40px;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .auth-subtitle {
            font-family: 'Montserrat', sans-serif;
            font-size: 11px;
            opacity: 0.5;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 50px;
        }
        .form-group label {
            display: block;
            font-family: 'Montserrat', sans-serif;
            font-size: 11px;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 12px;
            color: var(--pure-black);
            font-weight: 800;
        }
        .form-group input {
            width: 100%;
            padding: 15px;
            border: 1px solid var(--gray-light);
            font-family: 'Montserrat', sans-serif;
            font-size: 15px;
            background: #FAFAFA;
            transition: var(--transition);
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--primary-red);
            background: var(--pure-white);
        }
        .btn-auth {
            width: 100%;
            margin-top: 20px;
            padding: 20px;
            background: var(--primary-red);
            color: white;
            border: none;
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: var(--transition);
        }
        .btn-auth:hover {
            background: var(--primary-red-dark);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(212, 46, 46, 0.2);
        }
    </style>
</head>
<body style="background: var(--off-white);">
    <!-- SMART CAPSULE HEADER -->
    <header id="header"></header>

    <div class="auth-wrapper">
        <div class="auth-card">
            <a href="index.html" style="text-decoration: none; display: flex; flex-direction: column; align-items: center;">
                <img src="Images/LOGO.jpg" alt="ISPHILO Logo" style="height: 80px; width: 80px; border: 2px solid var(--pure-black); padding: 2px;">
                <div class="logo-text">ISPHILO <span>FRAGRANCE</span></div>
            </a>
            
            <h2 class="auth-title">Sign In</h2>
            <p class="auth-subtitle">Access your luxury collection</p>

            <div id="auth-message" style="display: none; background: #fff3f3; color: var(--primary-red); padding: 15px; margin-bottom: 30px; border-radius: 4px; font-family: 'Montserrat', sans-serif; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; border: 1px solid rgba(212, 46, 46, 0.2);">
                <!-- Dynamic Message -->
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="login-email" placeholder="Email" required>
                </div>
                
                <div class="form-group">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                        <label style="margin-bottom: 0;">Password</label>
                        <a href="forgot-password.html" style="font-family: 'Montserrat', sans-serif; font-size: 10px; color: var(--primary-red); text-decoration: none; font-weight: 800; text-transform: uppercase;">Forgot?</a>
                    </div>
                    <input type="password" id="login-pass" placeholder="Password" required>
                </div>

                <div class="form-group" style="display: flex; align-items: center; gap: 10px; margin-top: 15px;">
                    <input type="checkbox" id="remember-me" style="width: auto; margin: 0;">
                    <label style="margin: 0; font-size: 10px; opacity: 0.6;">Remember Me</label>
                </div>

                <button type="submit" class="btn-auth" id="loginBtn">Login Account</button>
            </form>

            <p style="margin-top: 40px; font-family: 'Montserrat', sans-serif; font-size: 11px; opacity: 0.6; letter-spacing: 1px; text-transform: uppercase; font-weight: 600;">
                New to ISPHILO? <a href="register.html" style="color: var(--primary-red); text-decoration: none; font-weight: 800;">Create Account</a>
            </p>
        </div>
    </div>

    <footer id="footer"></footer>

    <!-- JS -->
    <script src="assets/js/db.js"></script>
    <script src="assets/js/main.js"></script>
    <script>
        // Auth State Check - Redirect if already logged in
        if (ISPHILO_DB.isLoggedIn()) {
            const user = ISPHILO_DB.getCurrentUser();
            window.location.href = user.role === 'admin' ? 'admin/dashboard.html' : 'customer-dashboard.html';
        }

        // Check for checkout redirect reason or expired session
        const urlParams = new URLSearchParams(window.location.search);
        const reason = urlParams.get('reason');
        const expired = urlParams.get('expired');
        const authMessage = document.getElementById('auth-message');

        if (reason === 'checkout') {
            authMessage.style.display = 'block';
            authMessage.innerHTML = '<i class="fas fa-lock" style="margin-right: 10px;"></i> Please login to your account to proceed with your purchase.';
        } else if (expired) {
            authMessage.style.display = 'block';
            authMessage.innerHTML = '<i class="fas fa-clock" style="margin-right: 10px;"></i> Your session has expired. Please login again.';
        }

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-pass').value;
            const loginBtn = document.getElementById('loginBtn');
            const authMessage = document.getElementById('auth-message');
            
            // UI Loading State
            loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Authenticating...';
            loginBtn.disabled = true;

            const result = await ISPHILO_DB.login(email, pass);
            
            if (result.success) {
                if (result.redirect) return; // Handled by db.js
                
                showNotification('Login Successful! Welcome back.', 'success');
                setTimeout(() => {
                    window.location.href = result.user.role === 'admin' ? 'admin/dashboard.html' : 'customer-dashboard.html';
                }, 1000);
            } else {
                authMessage.style.display = 'block';
                authMessage.innerHTML = `<i class="fas fa-exclamation-circle" style="margin-right: 10px;"></i> ${result.message}`;
                loginBtn.innerHTML = 'Login Account';
                loginBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
